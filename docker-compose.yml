services:
  sotehus-pwa:
    build: .
    container_name: sotehus-pwa
    restart: unless-stopped
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
