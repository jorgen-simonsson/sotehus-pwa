<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sotehus - Swedish Electricity Spot Price & Power Monitoring Dashboard">
  <meta name="theme-color" content="#1a1a2e">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sotehus">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
  
  <title>Sotehus</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="dashboard">
    <div class="dashboard-container">

      <!-- Dashboard View -->
      <div id="dashboardView">

      <!-- Header -->
      <header class="dashboard-header">
        <button id="menuBtn" class="menu-btn" aria-label="Menu">☰</button>
        <h1 class="app-title" id="appTitle">Sotehus</h1>
        <button id="installBtn" class="install-btn" style="display: none;">
          📲 Install
        </button>
      </header>

      <!-- Menu Dropdown -->
      <div id="menuOverlay" class="menu-overlay hidden"></div>
      <nav id="menuDropdown" class="menu-dropdown hidden">
        <button class="menu-item" data-period="lastHour">💰 Cost last hour</button>
        <button class="menu-item" data-period="last24h">💰 Cost last 24 hours</button>
        <button class="menu-item" data-period="lastMonth">💰 Cost last calendar month</button>
        <button class="menu-item" id="menuSettings">⚙️ Settings</button>
      </nav>

      <!-- Spot Price Card -->
      <div class="card price-card">
        <div class="card-content">
          <div class="loading-spinner" id="priceSpinner">
            <div class="spinner"></div>
          </div>
          <div class="price-display" id="priceDisplay" style="display: none;">
            <span class="value" id="priceValue">--</span>
            <span class="unit">SEK/kWh</span>
          </div>
          <div class="error-message" id="priceError"></div>
          <div class="last-updated" id="priceUpdated"></div>
        </div>
      </div>

      <!-- Grid Consumption Card -->
      <div class="card power-card">
        <div class="card-header">
          <span class="card-icon">🏠</span>
          <span class="card-title">Grid Consumption</span>
        </div>
        <div class="card-content">
          <div class="loading-spinner" id="powerSpinner">
            <div class="spinner"></div>
            <span class="loading-text">Connecting...</span>
          </div>
          <div class="power-display" id="powerDisplay" style="display: none;">
            <span class="value" id="powerValue">--</span>
            <span class="unit">W</span>
          </div>
          <div class="status-indicator" id="powerStatus"></div>
          <div class="error-message" id="powerError"></div>
          <div class="last-updated" id="powerUpdated"></div>
        </div>
      </div>

      <!-- Solar Production Card -->
      <div class="card solar-card" id="solarCard">
        <div class="card-header">
          <span class="card-icon">☀️</span>
          <span class="card-title">Solar Production</span>
        </div>
        <div class="card-content">
          <div class="loading-spinner" id="solarSpinner">
            <div class="spinner"></div>
          </div>
          <div class="solar-display" id="solarDisplay" style="display: none;">
            <span class="value" id="solarValue">--</span>
            <span class="unit" id="solarUnit">W</span>
          </div>
          <div class="status-indicator" id="solarStatus"></div>
          <div class="error-message" id="solarError"></div>
          <div class="last-updated" id="solarUpdated"></div>
        </div>
      </div>

      <!-- Frequency Card -->
      <div class="card frequency-card">
        <div class="card-header">
          <span class="card-icon">⚡</span>
          <span class="card-title">Frequency</span>
        </div>
        <div class="card-content">
          <div class="loading-spinner" id="frequencySpinner">
            <div class="spinner"></div>
          </div>
          <div class="frequency-display" id="frequencyDisplay" style="display: none;">
            <span class="value" id="frequencyValue">--</span>
            <span class="unit">Hz</span>
          </div>
          <div class="error-message" id="frequencyError"></div>
          <div class="last-updated" id="frequencyUpdated"></div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="dashboard-footer">
        <p class="offline-status" id="offlineStatus"></p>
        <p class="version" id="versionLabel">v1.0.0</p>
      </footer>

      </div><!-- /dashboardView -->

      <!-- Cost View -->
      <div id="costView" class="hidden">
        <header class="cost-header">
          <h2 id="costTitle">Cost</h2>
        </header>

        <!-- Cost Loading -->
        <div id="costSpinner" class="loading-spinner">
          <div class="spinner"></div>
          <span class="loading-text">Loading cost data...</span>
        </div>

        <!-- Cost Error -->
        <div id="costError" class="cost-error"></div>

        <!-- Cost Summary -->
        <div id="costSummary" class="cost-summary hidden">
          <div class="cost-total-card">
            <span class="cost-total-label">Total cost</span>
            <span class="cost-total-value" id="costTotalValue">--</span>
            <span class="cost-total-unit">kr</span>
          </div>
          <div class="cost-details">
            <div class="cost-detail-row">
              <span>Energy consumed</span>
              <span id="costKwh">--</span>
            </div>
            <div class="cost-detail-row">
              <span>Energy sold to grid</span>
              <span id="costSoldEnergy">--</span>
            </div>
            <div class="cost-detail-row">
              <span>Cost reduction</span>
              <span id="costReduction">--</span>
            </div>
            <div class="cost-detail-row">
              <span>Period</span>
              <span id="costPeriod">--</span>
            </div>
          </div>
        </div>

        <button id="showBlocksBtn" class="blocks-btn hidden">Included price periods</button>

        <button id="costBackBtn" class="back-btn">← Back</button>
      </div><!-- /costView -->

      <!-- Blocks View -->
      <div id="blocksView" class="hidden">
        <button id="blocksBackBtn" class="back-btn">← Back</button>
        <div class="cost-table-wrapper">
          <table class="cost-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Spot</th>
                <th>kWh</th>
                <th>Cost</th>
              </tr>
            </thead>
            <tbody id="costTableBody"></tbody>
          </table>
        </div>
      </div><!-- /blocksView -->

      <!-- Settings View -->
      <div id="settingsView" class="hidden">
        <header class="cost-header">
          <h2>Settings</h2>
        </header>

        <div id="settingsSpinner" class="loading-spinner">
          <div class="spinner"></div>
          <span class="loading-text">Loading settings...</span>
        </div>

        <div id="settingsError" class="cost-error"></div>

        <div id="settingsList" class="settings-list hidden"></div>

        <div id="settingsStatus" class="settings-status"></div>

        <button id="settingsBackBtn" class="back-btn">← Back</button>
      </div><!-- /settingsView -->

    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
